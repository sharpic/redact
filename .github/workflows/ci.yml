name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit the coverage badge back
      checks: write     # needed for the test-reporter to annotate PRs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies
        run: |
          pip install python-docx odfpy openpyxl pdfplumber
          pip install spacy
          python -m spacy download en_core_web_sm
          pip install pytest pytest-cov coverage-badge radon click

      - name: Run tests
        run: |
          pytest redact_tests.py -v \
            --cov=redact \
            --cov-branch \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: pytest
          path: test-results.xml
          reporter: java-junit
          fail-on-empty: false

      - name: Cyclomatic complexity (radon)
        run: python -m radon cc -s -a redact.py

      - name: CRAP scores
        run: python .github/scripts/compute_crap.py

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: warn

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p badges
          coverage-badge -o badges/coverage.svg -f

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update coverage badge [skip ci]'
          file_pattern: badges/coverage.svg
